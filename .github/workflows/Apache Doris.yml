name: Apache Doris

on:
  repository_dispatch:
  workflow_dispatch:

jobs:
  Doris:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
      
    - name: Init Building Dependencies
      run: |
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo apt install build-essential byacc flex automake libtool-bin binutils-dev libiberty-dev zip unzip libncurses5-dev curl git ninja-build python
        sudo add-apt-repository ppa:ubuntu-toolchain-r/ppa
        sudo apt update
        sudo apt install gcc-10 g++-10 
        sudo apt-get install autoconf automake libtool autopoint
        
    - name: Setup Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 10.14.1

    - name: Setup java
      uses: actions/setup-java@v2
      with:
        distribution: adopt
        java-version: '8'
      
    - name: Set up Maven
      uses: stCarolas/setup-maven@v4.2
      with:
        maven-version: 3.8.2

    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v1.9
      with:
        cmake-version: '3.19.3'
      
    - name: Clone Source
      run: |
        echo "Clone Source":$(date +%F_%H%M%S)
        sudo mkdir -pv /build
        sudo chown -R runner:runner /build
        cd /build
        wget https://dlcdn.apache.org/incubator/doris/0.15.0-incubating/apache-doris-0.15.0-incubating-src.tar.gz
        tar -xf apache-doris-0.15.0-incubating-src.tar.gz
        mv apache-doris-0.15.0-incubating-src apache-doris
        sudo chown -R runner:runner /build
        cd apache-doris
        ls -lh
        pwd
        
    - name: Build fe be ui
      run: |
        sed -i '/set -eo pipefail/d' build.sh
        cat -n build.sh
        /bin/bash -x build.sh --fe --be --ui
        cp -R docs/ output/
        tree -L 4 fe/ be/ output/ 
        ln -s /build/apache-doris/thirdparty/installed/bin/thrift /usr/bin/thrift
        
    - name: Build broker
      run: |
        cat -n fs_brokers/apache_hdfs_broker/build.sh
        /bin/bash fs_brokers/apache_hdfs_broker/build.sh
        cp -R fs_brokers/apache_hdfs_broker/output/apache_hdfs_broker /build/apache-doris/output/
        
    - name: Build spark connector v2
      run: |
        thrift --version
        cat -n extension/spark-doris-connector/build.sh
        /bin/bash extension/spark-doris-connector/build.sh 2
        cp -R extension/spark-doris-connector/output /build/apache-doris/output/spark-doris-connector
        
    - name: Build flink connector
      run: |
        cat -n extension/flink-doris-connector/build.sh
        /bin/bash extension/flink-doris-connector/build.sh
        cp -R extension/flink-doris-connector/output /build/apache-doris/output/flink-doris-connector
        
    - name: Tar
      run: |
        cd /build/apache-doris/
        tar -czf /build/apache-doris-build-output.tar.gz output/
        md5sum /build/apache-doris-build-output.tar.gz
        ls -h /build/apache-doris-build-output.tar.gz

    - name: Doris Build output fe be ui
      if: ${{ always() }}
      uses: actions/upload-artifact@v2
      with:
        name: Doris_Build_output
        path: /build/apache-doris/output/
        if-no-files-found: ignore

    - name: Generate release tag
      id: tag
      run: |
        echo "::set-output name=release_tag::$(date +%F_%H%M%S)_doris"
        echo "::set-output name=release_date::$(date +"%F_%H%M%S")"
        touch release.txt
        echo "::set-output name=TAG_STATUS::success"
        
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v0.1.8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: ${{ steps.tag.outputs.release_date }}_doris
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          /build/apache-doris-build-output.tar.gz
