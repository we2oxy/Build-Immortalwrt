name:  R2S-lede

on:
  repository_dispatch:
  workflow_dispatch:
  # schedule:
    # - cron:  '40 16 * * 0,3'

jobs:
  R2S-lede:
    runs-on: ubuntu-18.04
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2
      
    - name: Cleanup Workflow Runs
      uses: GitRML/delete-workflow-runs@v1.2.1
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 15

    - uses: dev-drprasad/delete-older-releases@v0.2.0
      with:
        keep_latest: 15
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Init Building Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive 
      run: |
        sudo chmod -R +x $GITHUB_WORKSPACE/scripts/*.sh
        ls -alh $GITHUB_WORKSPACE/scripts/*.sh
        #bash $GITHUB_WORKSPACE/scripts/01_init_env.sh
        sudo timedatectl set-timezone "Asia/Shanghai"
        sudo -E swapoff -a
        docker rmi `docker images -q`
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /swapfile
        sudo -E apt-get remove -y --purge azure-cli ghc zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* mssql-tools msodbcsql17 android*
        sudo -E apt-get update -y 
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
        git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
        libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz \
        mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip qemu-utils \
        rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get autoremove -y --purge
        sudo -E apt-get clean -y
        ulimit -a
        ulimit -n 2048
        df -hP
        
    - name: Clone Source
      run: |
        bash $GITHUB_WORKSPACE/scripts/source_code/lede-R2S.sh
        
    - name: Configuration Customization
      id: configuration
      run: |
        wget -O /build/immortalwrt/.config https://raw.githubusercontent.com/we2oxy/Build-Immortalwrt/master/buildinfo/R2S/R2S.conf
        ls -lh /build/immortalwrt/
        md5sum /build/immortalwrt/.config
        
    - name: Defconfig
      id: defconfig
      run: |
        make defconfig
        make download -j8
        ./scripts/diffconfig.sh > /build/buildinfo/R2S-lede.conf
        echo "#######################"
        cat -n /build/buildinfo/R2S-lede.conf
        echo "#######################"
        
    - name: Deliver buildinfo
      if: ${{ always() }}
      uses: actions/upload-artifact@v2
      with:
        name: OpenWrt_buildinfo_R2S-K5.4
        path: /build/buildinfo/
        if-no-files-found: ignore
        
    - name: Compile
      id: tools
      run: |
        cd /build/lede/
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc) + 1)) || make -j1 V=s
        tree bin/
        tree -d bin/
        cd /build/lede/bin/targets/rockchip/armv8 && ls -lSha
        
    - name: Prepare artifact
      run: |
        rm -rf $(find /build/immortalwrt/bin/targets/ -type d -name "packages")
        cp -rf $(find /build/lede/bin/targets/ -type f) /build/upload/
        cp -rf $(find /build/lede/bin/packages/ -type f -name "*.ipk")  /build/package/
        cd /build/ && zip -qr /build/upload/package_$(date +%F_%H%M%S).zip  package/
        cd /build/upload/
        ls -lh
        
    - name: Deliver firmware
      if: ${{ always() }}
      uses: actions/upload-artifact@v2
      with:
        name: OpenWrt_firmware_R2S-lede
        path: /build/upload/
        if-no-files-found: ignore
        
    - name: Generate release tag
      id: tag
      run: |
        echo "::set-output name=release_tag::$(date +%F_%H%M%S)_lede-R2S"
        echo "::set-output name=release_date::$(date +"%F_%H%M%S")"
        touch release.txt
        echo "http://192.168.1.188" > release.txt
        echo "::set-output name=TAG_STATUS::success"
        
    - name: Upload firmware to release
      if: steps.tag.outputs.TAG_STATUS == 'success'
      uses: softprops/action-gh-release@v0.1.8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: ${{ steps.tag.outputs.release_date }}_lede-R2S
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          /build/upload/*
